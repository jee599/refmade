<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>슈퍼노바 — 금융의 모든 것</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    body {
      background: #e8ecf1;
      color: #191f28;
      overflow-x: hidden;
      min-height: 100vh;
    }
    .keep-all { word-break: keep-all; }

    /* --- Nav --- */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: linear-gradient(180deg, #e8ecf1 0%, rgba(232,236,241,0.92) 60%, rgba(232,236,241,0) 100%);
      padding-bottom: 20px;
    }
    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: #191f28;
    }
    .nav-logo svg { width: 28px; height: 28px; }
    .nav-logo-text {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #3182f6;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      list-style: none;
    }
    .nav-links a {
      font-size: 14px;
      font-weight: 500;
      color: #4e5968;
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #191f28; }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-lang {
      font-size: 13px;
      font-weight: 500;
      color: #4e5968;
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-lang:hover { color: #191f28; }
    .nav-lang-active { color: #191f28; font-weight: 700; }
    .nav-divider { color: #b0b8c1; font-size: 12px; }

    /* --- Hero --- */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
    }
    .hero-content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 140px 24px 0;
    }
    .hero-heading {
      font-size: clamp(34px, 5vw, 50px);
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -0.03em;
      color: #191f28;
      margin-bottom: 36px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease forwards 0.2s;
    }
    .hero-badges {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.8s ease forwards 0.5s;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 12px;
      background: #191f28;
      color: #fff;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      letter-spacing: -0.01em;
    }
    .badge:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }
    .badge svg { width: 20px; height: 20px; fill: #fff; }

    /* --- 3D Objects Image --- */
    .objects-image {
      width: 100%;
      margin-top: 40px;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 1s ease forwards 0.7s;
    }
    .objects-image img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    /* --- Animations --- */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- Responsive --- */
    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hero-content { padding-top: 120px; }
      .hero-heading { font-size: 28px; }
    }
    @media (max-width: 480px) {
      .hero-content { padding-top: 100px; }
      .hero-heading { font-size: 24px; }
      .badge { padding: 10px 20px; font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-inner">
    <a href="#" class="nav-logo">
      <svg viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="14" fill="#3182f6"/>
        <path d="M8 14.5L12 18.5L20 10.5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="nav-logo-text">슈퍼노바</span>
    </a>
    <ul class="nav-links">
      <li><a href="#">회사 소개</a></li>
      <li><a href="#">공지사항</a></li>
      <li><a href="#">고객센터</a></li>
      <li><a href="#">자주 묻는 질문</a></li>
      <li><a href="#">슈퍼노바증권</a></li>
      <li><a href="#">채용</a></li>
    </ul>
    <div class="nav-right">
      <a href="#" class="nav-lang nav-lang-active">KOR</a>
      <span class="nav-divider">|</span>
      <a href="#" class="nav-lang">ENG</a>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-content">
    <h1 class="hero-heading keep-all">금융의 모든 것<br>슈퍼노바에서 쉽고 간편하게</h1>
    <div class="hero-badges">
      <a href="#" class="badge">
        <svg viewBox="0 0 20 20"><path d="M14.5 10c0-1.08.6-2.03 1.48-2.53a7.57 7.57 0 0 0-.59-1.22c-.38.15-.8.2-1.22.13a2.95 2.95 0 0 0-1.37-1.57v-.01c-.27-.13-.56-.24-.87-.3a7.6 7.6 0 0 0-.23-1.35h-.02c-.78.01-1.5.28-2.1.72A2.95 2.95 0 0 0 7.47 3a7.53 7.53 0 0 0-1.03.94c-.26.3-.58.54-.94.7-.17.42-.28.87-.3 1.34-.56.34-1.03.8-1.36 1.36A7.63 7.63 0 0 0 2.5 10c0 1.08.6 2.03 1.48 2.53.09.42.23.84.4 1.22a2.95 2.95 0 0 1-.4 1.53c.33.56.77 1.04 1.3 1.39.42-.15.87-.2 1.32-.12.45.43.97.76 1.54.99.22-.38.56-.68.96-.87A7.6 7.6 0 0 0 10 18.5v.01c.78-.01 1.5-.28 2.1-.72.43.19.9.29 1.37.27.33-.39.73-.72 1.17-.96a2.95 2.95 0 0 0 .43-1.49c.56-.34 1.03-.8 1.36-1.37.22.06.45.08.67.08.24 0 .47-.03.7-.08A7.52 7.52 0 0 0 18.5 10h-4z"/></svg>
        App Store
      </a>
      <a href="#" class="badge">
        <svg viewBox="0 0 20 20"><path d="M4.01 2.01L12 10l-7.99 7.99a1.67 1.67 0 0 1-.12-.64V2.65c0-.22.04-.44.12-.64zM15.56 8.33L13 10l2.56 1.67 1.83-1.07a1.05 1.05 0 0 0 0-1.76l-1.83-1.07v.56zm-1.44.89L12 10l2.12 1.89 1.33-.78-1.33-.78v-.11zM12 10l-6.44 7.22 9.33-5.44L12 10z"/></svg>
        Google Play
      </a>
    </div>
  </div>

  <!-- 3D Objects Image -->
  <div class="objects-image">
    <img src="images/063-3d-objects.jpg" alt="3D rendered financial objects - van, cards, phone, piggy bank and more on light blue-gray background">
  </div>
</section>

</body>
</html>

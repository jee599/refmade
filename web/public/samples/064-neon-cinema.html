<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRISM — Live Cinema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }

    body {
      background: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Custom Cursor */
    #cursor {
      position: fixed;
      top: 0; left: 0;
      width: 12px; height: 12px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 10000;
      transform: translate(-50%, -50%);
      transition: width 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                  height 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                  background 0.25s ease,
                  border-radius 0.25s ease;
      mix-blend-mode: difference;
    }
    #cursor.hover {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.12);
      border: 1.5px solid rgba(255,255,255,0.4);
    }
    #cursor.arrow-hover {
      width: 60px; height: 60px;
      background: rgba(228, 64, 28, 0.15);
      border: 2px solid rgba(228, 64, 28, 0.6);
    }

    /* Top Nav Bar - Red/Orange */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      background: #E4401C;
    }

    .top-bar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 1400px;
      padding: 0 32px;
    }

    .brand {
      font-family: 'Anton', sans-serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #fff;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-icon {
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 14px;
      height: 14px;
      fill: #E4401C;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
      list-style: none;
    }

    .nav-links a {
      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: color 0.2s ease;
    }

    .nav-links a:hover { color: #fff; }

    .nav-icon {
      width: 18px;
      height: 18px;
      opacity: 0.85;
      transition: opacity 0.2s ease;
      cursor: none;
    }
    .nav-icon:hover { opacity: 1; }

    /* Get Tickets Bar */
    .tickets-bar {
      position: fixed;
      top: 44px; left: 0; right: 0;
      z-index: 199;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 36px;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .tickets-bar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 1400px;
      padding: 0 32px;
    }

    .tickets-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      cursor: none;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }
    .tickets-btn:hover { opacity: 0.8; }

    .tickets-arrow {
      width: 0;
      height: 0;
      border-left: 4px solid transparent;
      border-right: 4px solid transparent;
      border-top: 5px solid #E4401C;
      margin-left: 4px;
    }

    /* Hero Section - Full Screen Carousel */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .slides-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: opacity;
    }

    .slide.active {
      opacity: 1;
      z-index: 1;
    }

    .slide-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transform: scale(1.05);
      transition: transform 8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .slide.active .slide-bg {
      transform: scale(1);
    }

    /* Cinematic gradient overlays */
    .slide-overlay {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    .slide-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to right,
        rgba(0,0,0,0.65) 0%,
        rgba(0,0,0,0.25) 40%,
        rgba(0,0,0,0.1) 60%,
        rgba(0,0,0,0.2) 100%
      );
    }

    .slide-overlay::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(0,0,0,0.6) 0%,
        transparent 40%
      );
    }

    /* Slide Content */
    .slide-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      padding: 0 48px 120px;
      max-width: 900px;
    }

    .in-theaters-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #E4401C;
      border: 1.5px solid #E4401C;
      padding: 4px 10px;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.8s ease 0.3s, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.3s;
    }

    .slide.active .in-theaters-badge {
      opacity: 1;
      transform: translateY(0);
    }

    .film-title {
      font-family: 'Anton', sans-serif;
      font-size: clamp(48px, 8vw, 120px);
      font-weight: 400;
      line-height: 0.92;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: #fff;
      margin: 0;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease 0.5s, transform 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s;
    }

    .slide.active .film-title {
      opacity: 1;
      transform: translateY(0);
    }

    /* Navigation Arrows */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 2px solid #E4401C;
      color: #E4401C;
      cursor: none;
      transition: background 0.3s ease, border-color 0.3s ease, transform 0.3s ease;
    }

    .nav-arrow:hover {
      background: rgba(228, 64, 28, 0.15);
      transform: translateY(-50%) scale(1.05);
    }

    .nav-arrow:active {
      transform: translateY(-50%) scale(0.95);
    }

    .nav-arrow svg {
      width: 24px;
      height: 24px;
      stroke: #E4401C;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .nav-arrow.prev { left: 32px; }
    .nav-arrow.next { right: 32px; }

    /* Dot Indicators */
    .dots {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      border: none;
      cursor: none;
      transition: background 0.4s ease, transform 0.3s ease;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.2);
    }

    .dot:hover {
      background: rgba(255,255,255,0.6);
    }

    /* ========================================
       CONCERT / STAGE LIGHTING BACKGROUNDS
       Warm amber, orange, golden tones with
       bokeh-like circles and stage atmosphere
       ======================================== */

    /* Slide 1: Main concert - warm golden spotlight with performer silhouette */
    .slide-1 .slide-bg {
      background:
        /* Primary warm spotlight cone from above-center */
        radial-gradient(ellipse 45% 100% at 50% 0%, rgba(255, 190, 70, 0.6) 0%, transparent 65%),
        /* Hot white core of spotlight */
        radial-gradient(circle at 50% 15%, rgba(255, 250, 220, 0.5) 0%, rgba(255, 220, 140, 0.2) 15%, transparent 35%),
        /* Secondary amber wash from stage left */
        radial-gradient(ellipse 40% 70% at 20% 45%, rgba(220, 120, 30, 0.45) 0%, transparent 55%),
        /* Fill light from stage right */
        radial-gradient(ellipse 35% 60% at 80% 50%, rgba(200, 90, 20, 0.3) 0%, transparent 50%),
        /* Warm orange footlights glow from below */
        radial-gradient(ellipse 120% 30% at 50% 100%, rgba(230, 100, 20, 0.55) 0%, transparent 60%),
        /* Large soft bokeh orbs */
        radial-gradient(circle at 18% 22%, rgba(255, 200, 80, 0.35) 0%, rgba(255, 180, 60, 0.1) 6%, transparent 12%),
        radial-gradient(circle at 76% 18%, rgba(255, 170, 50, 0.3) 0%, rgba(255, 150, 30, 0.08) 7%, transparent 14%),
        radial-gradient(circle at 85% 42%, rgba(255, 190, 70, 0.25) 0%, rgba(255, 160, 40, 0.06) 5%, transparent 10%),
        radial-gradient(circle at 12% 58%, rgba(220, 110, 30, 0.22) 0%, rgba(200, 80, 20, 0.05) 6%, transparent 11%),
        radial-gradient(circle at 65% 68%, rgba(255, 150, 50, 0.2) 0%, transparent 8%),
        radial-gradient(circle at 30% 75%, rgba(240, 100, 20, 0.18) 0%, transparent 9%),
        radial-gradient(circle at 50% 35%, rgba(255, 220, 120, 0.15) 0%, transparent 7%),
        radial-gradient(circle at 42% 55%, rgba(255, 180, 80, 0.12) 0%, transparent 6%),
        /* Haze / atmospheric glow */
        radial-gradient(ellipse 100% 50% at 50% 40%, rgba(180, 80, 20, 0.2) 0%, transparent 70%),
        /* Deep venue base with warm undertone */
        linear-gradient(180deg, #1a0800 0%, #2a1205 20%, #3d1a08 40%, #2a1005 60%, #1a0a02 80%, #0a0400 100%);
    }

    /* Slide 2: Cool blue concert */
    .slide-2 .slide-bg {
      background:
        radial-gradient(ellipse 45% 100% at 48% 0%, rgba(80, 140, 240, 0.5) 0%, transparent 60%),
        radial-gradient(circle at 48% 12%, rgba(200, 220, 255, 0.45) 0%, transparent 25%),
        radial-gradient(ellipse 40% 70% at 25% 45%, rgba(40, 80, 200, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse 35% 60% at 75% 50%, rgba(60, 100, 220, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse 120% 30% at 50% 100%, rgba(20, 40, 120, 0.55) 0%, transparent 55%),
        radial-gradient(circle at 22% 20%, rgba(100, 160, 255, 0.3) 0%, transparent 10%),
        radial-gradient(circle at 80% 28%, rgba(70, 130, 240, 0.25) 0%, transparent 9%),
        radial-gradient(circle at 60% 60%, rgba(90, 150, 255, 0.18) 0%, transparent 8%),
        radial-gradient(circle at 10% 48%, rgba(50, 90, 200, 0.2) 0%, transparent 11%),
        radial-gradient(circle at 70% 15%, rgba(140, 190, 255, 0.15) 0%, transparent 7%),
        radial-gradient(ellipse 100% 50% at 50% 40%, rgba(30, 50, 140, 0.18) 0%, transparent 65%),
        linear-gradient(180deg, #040810 0%, #0a1428 20%, #0e1e3d 40%, #0a1530 60%, #081020 80%, #020408 100%);
    }

    /* Slide 3: Emerald atmosphere */
    .slide-3 .slide-bg {
      background:
        radial-gradient(ellipse 45% 100% at 52% 0%, rgba(80, 200, 80, 0.4) 0%, transparent 58%),
        radial-gradient(circle at 52% 15%, rgba(180, 255, 160, 0.35) 0%, transparent 22%),
        radial-gradient(ellipse 40% 65% at 28% 48%, rgba(50, 160, 60, 0.3) 0%, transparent 50%),
        radial-gradient(ellipse 35% 55% at 72% 52%, rgba(60, 170, 70, 0.25) 0%, transparent 48%),
        radial-gradient(ellipse 120% 28% at 50% 100%, rgba(25, 80, 30, 0.5) 0%, transparent 55%),
        radial-gradient(circle at 70% 22%, rgba(120, 220, 100, 0.22) 0%, transparent 9%),
        radial-gradient(circle at 15% 38%, rgba(80, 180, 70, 0.2) 0%, transparent 10%),
        radial-gradient(circle at 45% 70%, rgba(100, 200, 80, 0.16) 0%, transparent 8%),
        radial-gradient(ellipse 100% 50% at 50% 40%, rgba(30, 80, 30, 0.15) 0%, transparent 65%),
        linear-gradient(180deg, #060e04 0%, #0e2008 20%, #162c10 40%, #0e1c0a 60%, #0a1406 80%, #040802 100%);
    }

    /* Slide 4: Crimson stage */
    .slide-4 .slide-bg {
      background:
        radial-gradient(ellipse 45% 100% at 48% 0%, rgba(240, 50, 30, 0.5) 0%, transparent 60%),
        radial-gradient(circle at 48% 12%, rgba(255, 140, 100, 0.4) 0%, transparent 22%),
        radial-gradient(ellipse 40% 65% at 22% 45%, rgba(200, 30, 20, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse 35% 60% at 78% 48%, rgba(220, 40, 30, 0.3) 0%, transparent 48%),
        radial-gradient(ellipse 120% 30% at 50% 100%, rgba(180, 20, 10, 0.55) 0%, transparent 55%),
        radial-gradient(circle at 20% 25%, rgba(255, 80, 40, 0.28) 0%, transparent 9%),
        radial-gradient(circle at 82% 20%, rgba(230, 50, 30, 0.22) 0%, transparent 8%),
        radial-gradient(circle at 35% 65%, rgba(200, 40, 30, 0.2) 0%, transparent 10%),
        radial-gradient(circle at 88% 55%, rgba(255, 100, 60, 0.16) 0%, transparent 7%),
        radial-gradient(ellipse 100% 50% at 50% 40%, rgba(120, 20, 10, 0.18) 0%, transparent 65%),
        linear-gradient(180deg, #140404 0%, #2a0808 20%, #3d0e0e 40%, #2a0a08 60%, #1a0606 80%, #080202 100%);
    }

    /* Slide 5: Purple haze */
    .slide-5 .slide-bg {
      background:
        radial-gradient(ellipse 45% 100% at 50% 0%, rgba(160, 70, 240, 0.45) 0%, transparent 58%),
        radial-gradient(circle at 50% 14%, rgba(220, 170, 255, 0.4) 0%, transparent 24%),
        radial-gradient(ellipse 40% 65% at 25% 48%, rgba(130, 40, 200, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse 35% 55% at 75% 50%, rgba(150, 50, 220, 0.28) 0%, transparent 48%),
        radial-gradient(ellipse 120% 28% at 50% 100%, rgba(90, 20, 160, 0.5) 0%, transparent 55%),
        radial-gradient(circle at 72% 22%, rgba(200, 110, 255, 0.25) 0%, transparent 9%),
        radial-gradient(circle at 18% 35%, rgba(170, 70, 230, 0.22) 0%, transparent 10%),
        radial-gradient(circle at 58% 68%, rgba(190, 90, 250, 0.16) 0%, transparent 8%),
        radial-gradient(ellipse 100% 50% at 50% 40%, rgba(80, 20, 120, 0.15) 0%, transparent 65%),
        linear-gradient(180deg, #0a0414 0%, #14082a 20%, #1e1040 40%, #140830 60%, #0e0620 80%, #040208 100%);
    }

    /* Slide 6: Golden sunset */
    .slide-6 .slide-bg {
      background:
        radial-gradient(ellipse 50% 100% at 55% 0%, rgba(255, 200, 60, 0.55) 0%, transparent 60%),
        radial-gradient(circle at 55% 12%, rgba(255, 240, 180, 0.5) 0%, transparent 25%),
        radial-gradient(ellipse 40% 70% at 25% 45%, rgba(220, 140, 20, 0.4) 0%, transparent 50%),
        radial-gradient(ellipse 35% 55% at 80% 50%, rgba(200, 120, 10, 0.3) 0%, transparent 48%),
        radial-gradient(ellipse 120% 28% at 50% 100%, rgba(180, 100, 10, 0.5) 0%, transparent 55%),
        radial-gradient(circle at 18% 20%, rgba(255, 190, 60, 0.3) 0%, transparent 10%),
        radial-gradient(circle at 82% 35%, rgba(250, 170, 40, 0.22) 0%, transparent 8%),
        radial-gradient(circle at 38% 62%, rgba(220, 130, 20, 0.2) 0%, transparent 9%),
        radial-gradient(circle at 68% 72%, rgba(255, 210, 90, 0.16) 0%, transparent 7%),
        radial-gradient(ellipse 100% 50% at 50% 40%, rgba(140, 70, 10, 0.18) 0%, transparent 65%),
        linear-gradient(180deg, #140e04 0%, #241a08 20%, #3a2810 40%, #261c0a 60%, #1a1206 80%, #080602 100%);
    }

    /* Slide 7: Teal arena */
    .slide-7 .slide-bg {
      background:
        radial-gradient(ellipse 45% 100% at 48% 0%, rgba(30, 200, 220, 0.45) 0%, transparent 58%),
        radial-gradient(circle at 48% 14%, rgba(140, 240, 255, 0.4) 0%, transparent 24%),
        radial-gradient(ellipse 40% 65% at 22% 48%, rgba(20, 140, 180, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse 35% 55% at 78% 50%, rgba(30, 160, 200, 0.28) 0%, transparent 48%),
        radial-gradient(ellipse 120% 28% at 50% 100%, rgba(10, 80, 120, 0.5) 0%, transparent 55%),
        radial-gradient(circle at 28% 24%, rgba(60, 210, 240, 0.25) 0%, transparent 9%),
        radial-gradient(circle at 85% 32%, rgba(40, 190, 230, 0.2) 0%, transparent 8%),
        radial-gradient(circle at 38% 60%, rgba(30, 170, 210, 0.18) 0%, transparent 10%),
        radial-gradient(ellipse 100% 50% at 50% 40%, rgba(15, 60, 80, 0.15) 0%, transparent 65%),
        linear-gradient(180deg, #040e12 0%, #081a24 20%, #0e2834 40%, #0a1e2c 60%, #06141c 80%, #020810 100%);
    }

    /* Animated bokeh particles layer */
    .slide-bokeh {
      position: absolute;
      inset: 0;
      z-index: 1;
      overflow: hidden;
    }

    .bokeh-orb {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: bokehFloat 8s ease-in-out infinite;
    }

    .slide.active .bokeh-orb {
      opacity: 1;
    }

    @keyframes bokehFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.15; }
      25% { opacity: 0.4; }
      50% { transform: translateY(-25px) scale(1.15); opacity: 0.3; }
      75% { opacity: 0.35; }
    }

    /* Performer silhouette — tall figure center-right */
    .performer-silhouette {
      position: absolute;
      bottom: 0;
      z-index: 1;
      pointer-events: none;
    }

    .performer-silhouette svg {
      display: block;
    }

    /* Stage light beams — angular cones from above */
    .light-beams {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .light-beam {
      position: absolute;
      top: -5%;
      width: 2px;
      height: 110%;
      transform-origin: top center;
      opacity: 0;
      animation: beamPulse 6s ease-in-out infinite;
    }

    .slide.active .light-beam { opacity: 1; }

    @keyframes beamPulse {
      0%, 100% { opacity: 0.06; }
      40% { opacity: 0.14; }
      60% { opacity: 0.1; }
    }

    /* Stage floor glow band */
    .slide-stage {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 22%;
      z-index: 1;
      background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.4) 50%, transparent 100%);
    }

    /* Crowd silhouette shapes */
    .slide-crowd {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 10%;
      z-index: 1;
    }

    .slide-crowd svg {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Raised hands scattered in crowd */
    .crowd-hands {
      position: absolute;
      bottom: 6%;
      left: 0;
      right: 0;
      height: 12%;
      z-index: 1;
      pointer-events: none;
    }

    .crowd-hands svg {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 100%;
    }

    /* Lens flare accent */
    .lens-flare {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
      animation: flareGlow 4s ease-in-out infinite alternate;
    }

    @keyframes flareGlow {
      0% { opacity: 0.15; transform: scale(1); }
      100% { opacity: 0.35; transform: scale(1.18); }
    }

    /* Secondary small lens flare (anamorphic streak) */
    .lens-streak {
      position: absolute;
      z-index: 1;
      pointer-events: none;
      animation: streakPulse 5s ease-in-out infinite alternate;
    }

    @keyframes streakPulse {
      0% { opacity: 0.2; }
      100% { opacity: 0.5; }
    }

    /* Noise texture overlay */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 9000;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* Subtle film grain scan lines */
    .scanlines {
      position: fixed;
      inset: 0;
      z-index: 8999;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
    }

    /* Corner logo watermark */
    .corner-logo {
      position: absolute;
      bottom: 40px;
      right: 40px;
      z-index: 10;
      width: 36px;
      height: 36px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Anton', sans-serif;
      font-size: 11px;

      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>

    <!-- Dot Indicators -->
    <div class="dots" role="tablist" aria-label="Slide navigation">
      <button class="dot active" role="tab" aria-selected="true" aria-label="Go to slide 1" data-slide="0"></button>
      <button class="dot" role="tab" aria-selected="false" aria-label="Go to slide 2" data-slide="1"></button>
      <button class="dot" role="tab" aria-selected="false" aria-label="Go to slide 3" data-slide="2"></button>
      <button class="dot" role="tab" aria-selected="false" aria-label="Go to slide 4" data-slide="3"></button>
      <button class="dot" role="tab" aria-selected="false" aria-label="Go to slide 5" data-slide="4"></button>
      <button class="dot" role="tab" aria-selected="false" aria-label="Go to slide 6" data-slide="5"></button>
      <button class="dot" role="tab" aria-selected="false" aria-label="Go to slide 7" data-slide="6"></button>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar" aria-hidden="true"></div>

    <!-- Corner Logo -->
    <div class="corner-logo" aria-hidden="true">P</div>

  <script>
    // Carousel Logic
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.dot');
    const prevBtn = document.querySelector('.nav-arrow.prev');
    const nextBtn = document.querySelector('.nav-arrow.next');
    const progressBar = document.querySelector('.progress-bar');
    let current = 0;
    let autoPlayInterval;
    const SLIDE_DURATION = 6000;

    function goToSlide(index) {
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      dots[current].setAttribute('aria-selected', 'false');

      current = (index + slides.length) % slides.length;

      slides[current].classList.add('active');
      dots[current].classList.add('active');
      dots[current].setAttribute('aria-selected', 'true');

      resetProgress();
    }

    function nextSlide() {
      goToSlide(current + 1);
    }

    function prevSlide() {
      goToSlide(current - 1);
    }

    function resetProgress() {
      progressBar.style.transition = 'none';
      progressBar.style.width = '0%';
      void progressBar.offsetWidth;
      progressBar.style.transition = `width ${SLIDE_DURATION}ms linear`;
      progressBar.style.width = '100%';
    }

    function startAutoPlay() {
      stopAutoPlay();
      resetProgress();
      autoPlayInterval = setInterval(nextSlide, SLIDE_DURATION);
    }

    function stopAutoPlay() {
      clearInterval(autoPlayInterval);
    }

    prevBtn.addEventListener('click', () => {
      prevSlide();
      startAutoPlay();
    });

    nextBtn.addEventListener('click', () => {
      nextSlide();
      startAutoPlay();
    });

    dots.forEach((dot) => {
      dot.addEventListener('click', () => {
        const slideIndex = parseInt(dot.dataset.slide, 10);
        goToSlide(slideIndex);
        startAutoPlay();
      });
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') {
        prevSlide();
        startAutoPlay();
      } else if (e.key === 'ArrowRight') {
        nextSlide();
        startAutoPlay();
      }
    });

    // Touch/swipe support
    let touchStartX = 0;
    let touchEndX = 0;
    const hero = document.querySelector('.hero');

    hero.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });

    hero.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;
      if (Math.abs(diff) > 50) {
        if (diff > 0) nextSlide();
        else prevSlide();
        startAutoPlay();
      }
    }, { passive: true });

    // Pause on hover
    hero.addEventListener('mouseenter', stopAutoPlay);
    hero.addEventListener('mouseleave', startAutoPlay);

    startAutoPlay();

    // Custom Cursor
    const cursor = document.getElementById('cursor');
    let mouseX = 0, mouseY = 0;
    let cursorX = 0, cursorY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function animateCursor() {
      const dx = mouseX - cursorX;
      const dy = mouseY - cursorY;
      cursorX += dx * 0.15;
      cursorY += dy * 0.15;
      cursor.style.left = cursorX + 'px';
      cursor.style.top = cursorY + 'px';
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    // Cursor hover states
    document.querySelectorAll('[data-cursor]').forEach(el => {
      el.addEventListener('mouseenter', () => {
        cursor.classList.add(el.dataset.cursor);
      });
      el.addEventListener('mouseleave', () => {
        cursor.classList.remove(el.dataset.cursor);
      });
    });

    document.addEventListener('mousedown', () => cursor.style.transform = 'translate(-50%, -50%) scale(0.85)');
    document.addEventListener('mouseup', () => cursor.style.transform = 'translate(-50%, -50%) scale(1)');

    document.addEventListener('mouseleave', () => cursor.style.opacity = '0');
    document.addEventListener('mouseenter', () => cursor.style.opacity = '1');
  </script>
</body>
